    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #00e68a;
    --accent-dim: rgba(0,230,138,0.12);
    --wang: #ff6b4a;
    --wang-dim: rgba(255,107,74,0.12);
    --kai: #5b8cff;
    --kai-dim: rgba(91,140,255,0.12);
    --chao: #ffb84d;
    --chao-dim: rgba(255,184,77,0.12);
    --high: #ff4757;
    --mid: #ffa502;
    --low: #2ed573;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,230,138,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(91,140,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .header-label {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .header p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }
  .header-meta {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .header-meta span {
    font-size: 13px;
    color: var(--text-dim);
  }
  .header-meta strong {
    color: var(--text);
    font-weight: 600;
  }

  /* 统计卡片 */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* 筛选栏 */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 18px;
    color: var(--text-dim);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .filter-btn.active[data-filter="老王"] {
    background: var(--wang-dim);
    border-color: var(--wang);
    color: var(--wang);
  }
  .filter-btn.active[data-filter="凯哥"] {
    background: var(--kai-dim);
    border-color: var(--kai);
    color: var(--kai);
  }
  .filter-btn.active[data-filter="党超"] {
    background: var(--chao-dim);
    border-color: var(--chao);
    color: var(--chao);
  }
  .filter-btn.active[data-filter="已完成"] {
    background: rgba(46,213,115,0.12);
    border-color: var(--low);
    color: var(--low);
  }

  /* 分类标题 */
  .section-title {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 32px 0 16px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* 任务卡片 */
  .task-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.2s;
    cursor: default;
    animation: fadeIn 0.3s ease both;
  }
  .task-card:hover {
    background: var(--card-hover);
    border-color: #3a3a4f;
    transform: translateY(-1px);
  }
  .task-card.done {
    opacity: 0.45;
  }
  .task-card.done .task-title {
    text-decoration: line-through;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-check {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }
  .task-check:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .task-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-check.checked::after {
    content: '✓';
    color: var(--bg);
    font-size: 13px;
    font-weight: 700;
  }

  .task-body {
    flex: 1;
    min-width: 0;
  }
  .task-header {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .task-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .task-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .tag {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 500;
    white-space: nowrap;
  }
  .tag-executor {
    font-weight: 600;
  }
  .tag-executor.wang { background: var(--wang-dim); color: var(--wang); }
  .tag-executor.kai { background: var(--kai-dim); color: var(--kai); }
  .tag-executor.chao { background: var(--chao-dim); color: var(--chao); }
  .tag-priority { background: rgba(255,255,255,0.06); color: var(--text-dim); }
  .tag-priority.high { background: rgba(255,71,87,0.15); color: var(--high); }
  .tag-priority.mid { background: rgba(255,165,2,0.15); color: var(--mid); }
  .tag-priority.low { background: rgba(46,213,115,0.15); color: var(--low); }
  .tag-date { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  .task-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-top: 4px;
  }

  /* 进度条 */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b4d8);
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;

  /* 空状态 */

    padding: 60px 20px;
    color: var(--text-dim);

    border-top: 1px solid var(--border);

    font-size: 12px;
    color: var(--text-dim);

  /* 响应式 */

    .filters { gap: 6px; }

  }

  /* 搜索框 */
  .search-box {
    position: relative;

  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 40px;

    border-radius: var(--radius-sm);
    color: var(--text);

  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent); }
  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
  }
</style>
</head>

// localStorage 持久化
const STORAGE_KEY = 'billiard_tasks_v1';
let taskStates = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

function saveStates() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(taskStates));
}

function isDone(id) {
  return taskStates[id] === true;
}

function toggleDone(id) {
  taskStates[id] = !isDone(id);
  saveStates();
  render();
}

function getExecutorClass(executor) {
  if (executor === '老王') return 'wang';
  if (executor === '凯哥') return 'kai';
  if (executor === '党超') return 'chao';
  return '';
}

function getPriorityClass(priority) {
  if (priority === 'high') return 'high';
  if (priority === 'mid') return 'mid';
  return 'low';
}

function getPriorityLabel(priority) {
  if (priority === 'high') return '紧急';
  if (priority === 'mid') return '重要';
  return '普通';
}

// 当前筛选状态
let currentFilter = '全部';
let searchQuery = '';

function render() {
  const list = document.getElementById('taskList');
  const query = searchQuery.toLowerCase();

  // 按分类分组
  const categories = {};
  
  tasks.forEach((t, i) => {
    // 筛选
    if (currentFilter === '已完成' && !isDone(t.id)) return;
    if (currentFilter !== '全部' && currentFilter !== '已完成') {
      if (t.executor !== currentFilter) return;
    }
    // 搜索
    if (query && !t.title.toLowerCase().includes(query) && !t.desc.toLowerCase().includes(query) && !t.category.toLowerCase().includes(query)) return;

    if (!categories[t.category]) categories[t.category] = [];
    categories[t.category].push(t);
  });

  // 统计
  const allDone = tasks.filter(t => isDone(t.id)).length;
  const allTotal = tasks.length;
  const highTasks = tasks.filter(t => t.priority === 'high' && !isDone(t.id));
  const wangTasks = tasks.filter(t => t.executor === '老王' && !isDone(t.id));
  const kaiTasks = tasks.filter(t => t.executor === '凯哥' && !isDone(t.id));
  const chaoTasks = tasks.filter(t => t.executor === '党超' && !isDone(t.id));

  document.getElementById('totalCount').textContent = allTotal;
  document.getElementById('highCount').textContent = highTasks.length;
  document.getElementById('wangCount').textContent = wangTasks.length;
  document.getElementById('kaiCount').textContent = kaiTasks.length;
  document.getElementById('chaoCount').textContent = chaoTasks.length;
  document.getElementById('progressText').textContent = `${allDone} / ${allTotal}`;
  document.getElementById('progressFill').style.width = `${(allDone / allTotal * 100)}%`;

  if (Object.keys(categories).length === 0) {
    list.innerHTML = '<div class="empty-state">没有匹配的任务 🎱</div>';
    return;
  }

  let html = '';
  let idx = 0;
  
  for (const [cat, catTasks] of Object.entries(categories)) {
    // 按优先级排序：high > mid > low
    const priorityOrder = { high: 0, mid: 1, low: 2 };
    catTasks.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

    html += `<div class="section-title">${cat}</div>`;
    html += '<div class="task-grid">';

    catTasks.forEach(t => {
      const done = isDone(t.id);
      const delay = idx * 30;
      idx++;

      html += `
        <div class="task-card ${done ? 'done' : ''}" style="animation-delay:${delay}ms">
          <div class="task-check ${done ? 'checked' : ''}" onclick="toggleDone(${t.id})"></div>
          <div class="task-body">
            <div class="task-header">
              <span class="task-title">${t.title}</span>
            </div>
            ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
            <div class="task-tags">
              <span class="tag tag-executor ${getExecutorClass(t.executor)}">${t.executor}</span>
              <span class="tag tag-priority ${getPriorityClass(t.priority)}">${getPriorityLabel(t.priority)}</span>
              ${t.date ? `<span class="tag tag-date">📅 ${t.date}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    });

    html += '</div>';
  }

  list.innerHTML = html;
}

// 筛选按钮
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// 搜索
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

// 初始渲染
render();
</script>
